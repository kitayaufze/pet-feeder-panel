<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>宠物自动喂食 — 控制面板</title>
<style>
  :root { --bg: #f5f5f5; --card: #fff; --text: #333; --muted: #999; --accent: #1890ff; --danger: #ff4d4f; --green: #52c41a; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); padding: 16px; max-width: 800px; margin: 0 auto; }
  h1 { font-size: 20px; margin-bottom: 16px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .card { background: var(--card); border-radius: 10px; padding: 16px; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
  .card.full { grid-column: 1/-1; }
  .label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; }
  .value { font-size: 28px; font-weight: 700; }
  .value.small { font-size: 16px; font-weight: 500; }
  .row { display: flex; align-items: center; gap: 8px; margin: 8px 0; }
  input[type=range] { flex: 1; accent-color: var(--accent); }
  button { border: none; border-radius: 6px; padding: 8px 18px; font-size: 14px; cursor: pointer; font-weight: 600; }
  .btn-feed { background: var(--accent); color: #fff; width: 100%; padding: 12px; font-size: 16px; }
  .btn-snap { background: #722ed1; color: #fff; width: 100%; padding: 10px; }
  .btn-sched { background: #13c2c2; color: #fff; font-size: 12px; padding: 5px 12px; }
  .btn-del { background: var(--danger); color: #fff; font-size: 11px; padding: 3px 8px; }
  .btn-small { background: var(--accent); color: #fff; font-size: 11px; padding: 3px 10px; }
  .dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 4px; }
  .dot.online { background: var(--green); }
  .dot.offline { background: var(--danger); }
  .photo img { width: 100%; border-radius: 6px; margin-top: 8px; }
  .photo-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .photo-list img { width: 64px; height: 48px; object-fit: cover; border-radius: 4px; cursor: pointer; border: 2px solid transparent; }
  .photo-list img.active { border-color: var(--accent); }
  .log { font-size: 11px; color: var(--muted); max-height: 120px; overflow-y: auto; background: #fafafa; padding: 8px; border-radius: 6px; margin-top: 8px; }
  .log div { margin: 2px 0; }
  .schedule-item { display: flex; align-items: center; gap: 6px; margin: 4px 0; font-size: 13px; }
  .schedule-item span { min-width: 80px; }
  .connected { color: var(--green); }
  .disconnected { color: var(--danger); }
</style>
</head>
<body>

<h1>🐱 宠物自动喂食控制面板</h1>

<div style="margin-bottom:12px;">
  状态：<span id="mqttStatus" class="disconnected">● 未连接</span>
  &nbsp;|&nbsp; 设备：<span id="deviceStatus" class="dot offline"></span><span id="deviceLabel">等待上线</span>
</div>

<div class="grid">

  <!-- 称重 -->
  <div class="card">
    <div class="label">粮仓余量</div>
    <div class="value" id="weightBin">--.- g</div>
  </div>
  <div class="card">
    <div class="label">食盆重量</div>
    <div class="value" id="weightBowl">--.- g</div>
  </div>

  <!-- 手动喂食 -->
  <div class="card full">
    <div class="label">手动喂食</div>
    <div class="row">
      <span id="gramsLabel" style="font-weight:700;min-width:40px">50g</span>
      <input type="range" id="gramsSlider" min="5" max="200" value="50" step="5" oninput="updateGrams()">
    </div>
    <button class="btn-feed" onclick="sendFeed()">🍖 立即喂食</button>
    <div class="log" id="feedLog"><div>等待指令...</div></div>
  </div>

  <!-- 拍照 -->
  <div class="card full">
    <div class="label">拍照 & 照片</div>
    <div style="display:flex;gap:8px;">
      <button class="btn-snap" onclick="sendSnap()" style="flex:1">📷 拍一张</button>
    </div>
    <div class="photo" id="photoArea"><p style="color:var(--muted);margin-top:8px">暂无照片</p></div>
    <div class="photo-list" id="photoThumbs"></div>
  </div>

  <!-- 定时计划 -->
  <div class="card full">
    <div class="label">定时喂食计划</div>
    <div id="scheduleList" style="margin:6px 0;font-size:13px;color:var(--muted)">加载中...</div>
    <div class="row" style="gap:4px;">
      <select id="schedHour" style="padding:4px;"></select>:<select id="schedMin" style="padding:4px;"></select>
      <input type="number" id="schedGrams" value="30" min="5" max="200" style="width:56px;padding:4px;">g
      <button class="btn-sched" onclick="addSchedule()">+</button>
      <button class="btn-small" onclick="saveSchedule()">💾 保存</button>
    </div>
  </div>

</div>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<script>
// ── 配置 ──
const BROKER  = 'n15ed731.ala.cn-hangzhou.emqxsl.cn';
const PORT_WSS = 8084;
const USER    = 'ESP32';
const PASS    = '123qweasd';
const DEV_MAIN = '2EE3A0';
const DEV_CAM  = 'F82C9C';

const TOPIC_WEIGHT    = `esp32/${DEV_MAIN}/status/weight`;
const TOPIC_FEED_RES  = `esp32/${DEV_MAIN}/status/feed_result`;
const TOPIC_SCHEDULE  = `esp32/${DEV_MAIN}/status/schedule`;
const TOPIC_ONLINE    = `esp32/${DEV_MAIN}/status/online`;
const TOPIC_PHOTO_URL = `esp32/${DEV_CAM}/status/photo_url`;
const TOPIC_CMD_FEED   = `esp32/${DEV_MAIN}/cmd/feed`;
const TOPIC_CMD_SCHED  = `esp32/${DEV_MAIN}/cmd/schedule`;
const TOPIC_CMD_PHOTO  = `esp32/${DEV_MAIN}/cmd/photo`;

// ── 状态 ──
let currentSchedule = [];
let photoUrls = [];
let currentPhotoIdx = 0;

// ── 页面加载：尝试从 ESP32-CAM 拉取已有照片列表 ──
function loadExistingPhotos() {
  const camHost = `http://192.168.43.122`;
  // 尝试逐个检查槽位照片是否存在（最多 10 张）
  let pending = 0;
  for (let slot = 0; slot < 10; slot++) {
    const url = `${camHost}/photo_${slot}.jpg`;
    const img = new Image();
    const idx = slot;
    img.onload = function() {
      // 照片存在，加入列表
      if (!photoUrls.includes(url)) {
        photoUrls.push(url);
      }
    };
    img.onerror = function() {
      // 照片不存在，忽略
    };
    img.onloadend = function() {
      pending--;
      if (pending <= 0) {
        // 全部检查完毕，排序并显示
        photoUrls.sort();
        if (photoUrls.length > 0) renderPhotos();
      }
    };
    pending++;
    img.src = url;
  }
  // 超时兜底（3 秒后无论是否加载完都渲染）
  setTimeout(() => {
    if (pending > 0) { pending = 0; if (photoUrls.length > 0) renderPhotos(); }
  }, 3000);
}

// ── MQTT 连接 ──
const client = mqtt.connect(`wss://${BROKER}:${PORT_WSS}/mqtt`, {
  username: USER,
  password: PASS,
  clientId: 'web_panel_' + Math.random().toString(16).slice(2, 10),
  clean: true
});

client.on('connect', () => {
  document.getElementById('mqttStatus').innerHTML = '<span class="connected">● 已连接</span>';
  client.subscribe([TOPIC_WEIGHT, TOPIC_FEED_RES, TOPIC_SCHEDULE, TOPIC_ONLINE, TOPIC_PHOTO_URL]);
  // 加载时同步 ESP32-CAM 上已有的照片（仅局域网内有效）
  loadExistingPhotos();
});

client.on('close', () => {
  document.getElementById('mqttStatus').innerHTML = '<span class="disconnected">● 断开，重连中...</span>';
});

client.on('message', (topic, payload) => {
  const msg = payload.toString();
  try {
    const data = JSON.parse(msg);
    handleMessage(topic, data);
  } catch (e) {
    // 非 JSON（如 "online" / "offline" 字符串）
    if (topic === TOPIC_ONLINE) {
      if (msg === 'online') {
        document.getElementById('deviceStatus').className = 'dot online';
        document.getElementById('deviceLabel').textContent = '主ESP32 在线';
      } else {
        document.getElementById('deviceStatus').className = 'dot offline';
        document.getElementById('deviceLabel').textContent = '主ESP32 离线';
      }
    }
  }
});

function handleMessage(topic, data) {
  if (topic === TOPIC_WEIGHT) {
    document.getElementById('weightBin').textContent = data.bin.toFixed(1) + ' g';
    document.getElementById('weightBowl').textContent = data.bowl.toFixed(1) + ' g';
  } else if (topic === TOPIC_FEED_RES) {
    const div = document.getElementById('feedLog');
    const time = new Date().toLocaleTimeString();
    div.innerHTML += `<div>[${time}] 喂食 ${data.dispensed}g / 目标 ${data.target}g ${data.ok ? '✅' : '❌'}</div>`;
    div.scrollTop = div.scrollHeight;
  } else if (topic === TOPIC_SCHEDULE) {
    currentSchedule = (data.times || []).map(s => {
      const parts = s.split(':');
      return { hour: parts[0], min: parts[1], grams: parts[2] };
    });
    renderSchedule();
  } else if (topic === TOPIC_PHOTO_URL) {
    if (data.ok && data.url) {
      photoUrls.unshift(data.url);
      if (photoUrls.length > 20) photoUrls.length = 20;
      renderPhotos();
    }
  }
}

// ── 喂食 ──
function updateGrams() {
  const v = document.getElementById('gramsSlider').value;
  document.getElementById('gramsLabel').textContent = v + 'g';
}
function sendFeed() {
  const g = parseInt(document.getElementById('gramsSlider').value);
  client.publish(TOPIC_CMD_FEED, JSON.stringify({ grams: g }));
  const div = document.getElementById('feedLog');
  div.innerHTML += `<div>[${new Date().toLocaleTimeString()}] 已发送: ${g}g ⏳</div>`;
  div.scrollTop = div.scrollHeight;
}

// ── 拍照 ──
function sendSnap() {
  client.publish(TOPIC_CMD_PHOTO, JSON.stringify({ action: 'snap' }));
}

// ── 照片显示 ──
function renderPhotos() {
  const area = document.getElementById('photoArea');
  const thumbs = document.getElementById('photoThumbs');
  if (photoUrls.length === 0) return;
  currentPhotoIdx = 0;
  area.innerHTML = `<img src="${photoUrls[0]}" alt="最新照片">`;
  thumbs.innerHTML = photoUrls.slice(0, 10).map((url, i) =>
    `<img src="${url}" class="${i===0?'active':''}" onclick="showPhoto(${i})">`
  ).join('');
}
function showPhoto(idx) {
  currentPhotoIdx = idx;
  document.getElementById('photoArea').innerHTML = `<img src="${photoUrls[idx]}" alt="照片">`;
  const imgs = document.querySelectorAll('.photo-list img');
  imgs.forEach((el, i) => el.className = i === idx ? 'active' : '');
}

// ── 定时计划 ──
function renderSchedule() {
  const el = document.getElementById('scheduleList');
  if (currentSchedule.length === 0) {
    el.innerHTML = '暂无计划';
    return;
  }
  el.innerHTML = currentSchedule.map((s, i) =>
    `<div class="schedule-item">
      <span>⏰ ${s.hour}:${s.min}</span> → ${s.grams}g
      <button class="btn-del" onclick="removeSchedule(${i})">✕</button>
    </div>`
  ).join('');
}

function addSchedule() {
  const h = document.getElementById('schedHour').value;
  const m = document.getElementById('schedMin').value;
  const g = document.getElementById('schedGrams').value;
  if (currentSchedule.length >= 5) { alert('最多 5 条'); return; }
  currentSchedule.push({ hour: h, min: m, grams: g });
  currentSchedule.sort((a, b) => a.hour*60+a.min - b.hour*60-b.min);
  renderSchedule();
}
function removeSchedule(i) { currentSchedule.splice(i, 1); renderSchedule(); }
function saveSchedule() {
  const times = currentSchedule.map(s => `${s.hour}:${s.min}:${s.grams}`);
  client.publish(TOPIC_CMD_SCHED, JSON.stringify({ times }));
}

// ── 时间选择器初始化 ──
function initTimePickers() {
  const hSel = document.getElementById('schedHour');
  const mSel = document.getElementById('schedMin');
  for (let h = 0; h < 24; h++) {
    const o = document.createElement('option');
    o.value = String(h).padStart(2, '0');
    o.text = String(h).padStart(2, '0') + ' 时';
    hSel.appendChild(o);
  }
  for (let m = 0; m < 60; m += 5) {
    const o = document.createElement('option');
    o.value = String(m).padStart(2, '0');
    o.text = String(m).padStart(2, '0') + ' 分';
    mSel.appendChild(o);
  }
}
initTimePickers();
</script>
</body>
</html>
