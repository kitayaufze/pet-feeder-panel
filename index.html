<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>宠物自动喂食</title>
<style>
  :root {
    --bg:      #F4EFE6;
    --card:    #FFFCF6;
    --border:  #E8DFD2;
    --text:    #3D3226;
    --muted:   #9B8C78;
    --accent:  #C8803C;
    --accent-hover: #B06E2E;
    --green:   #5D9B63;
    --danger:  #D4644E;
    --photo:   #8E7DAA;
    --photo-hover: #7A6B94;
    --ring:    #E8D5BC;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  .topbar {
    position: sticky; top: 0; z-index: 10;
    background: rgba(244,239,230,0.92);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    padding: 14px 20px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }
  .topbar h1 { font-size: 17px; font-weight: 620; letter-spacing: -0.2px; }
  .topbar .status-row { display: flex; align-items: center; gap: 16px; font-size: 12px; color: var(--muted); }
  .pulse { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 5px; vertical-align: middle; position: relative; }
  .pulse.live { background: var(--green); }
  .pulse.dead { background: var(--danger); }
  .pulse.live::after {
    content: ''; position: absolute;
    inset: -3px; border-radius: 50%;
    border: 1.5px solid var(--green);
    animation: breathe 2s ease-in-out infinite;
  }
  @keyframes breathe {
    0%,100%{opacity:1;transform:scale(1)}
    50%{opacity:.3;transform:scale(1.6)}
  }

  .main { max-width: 600px; margin: 0 auto; padding: 16px 16px 48px; }
  .card { background: var(--card); border-radius: 14px; padding: 20px; margin-bottom: 12px; border: 1px solid var(--border); }

  .weights { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .weight-card { text-align: center; padding: 28px 16px 22px; }
  .weight-card .ring {
    display: inline-flex; align-items: center; justify-content: center;
    width: 96px; height: 96px; border-radius: 50%;
    border: 3px solid var(--ring); margin-bottom: 12px;
  }
  .weight-card .ring .num { font-size: 30px; font-weight: 680; font-feature-settings:"tnum"; letter-spacing: -0.5px; line-height: 1; }
  .weight-card .ring .unit { font-size: 14px; font-weight: 500; color: var(--muted); margin-left: 2px; }
  .weight-card .lbl { font-size: 13px; color: var(--muted); font-weight: 500; letter-spacing: 0.3px; }

  .section-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.6px; color: var(--muted); margin-bottom: 10px; font-weight: 600; }

  .feed-slider { display: flex; align-items: center; gap: 12px; margin: 8px 0 14px; }
  .feed-slider .grams-display { font-size: 36px; font-weight: 680; font-feature-settings:"tnum"; min-width: 64px; text-align: center; line-height: 1; }
  .feed-slider .grams-display .unit { font-size: 16px; font-weight: 500; color: var(--muted); }
  .feed-slider input[type=range] { flex: 1; accent-color: var(--accent); height: 6px; }

  button { border: none; border-radius: 10px; font-family: inherit; font-weight: 600; font-size: 15px; cursor: pointer; transition: background 0.15s, transform 0.1s, box-shadow 0.15s; }
  button:active { transform: scale(0.97); }
  .btn-primary { background: var(--accent); color: #fff; width: 100%; padding: 13px; font-size: 16px; }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-photo { background: var(--photo); color: #fff; width: 100%; padding: 11px; font-size: 15px; }
  .btn-photo:hover { background: var(--photo-hover); }
  .btn-sm { font-size: 12px; padding: 5px 14px; border-radius: 7px; }
  .btn-del { background: none; color: var(--danger); font-size: 13px; padding: 2px 6px; border-radius: 5px; }
  .btn-del:hover { background: #fef2f0; }

  .feed-log {
    margin-top: 12px; font-size: 12px; color: var(--muted);
    max-height: 100px; overflow-y: auto;
    background: #FAF6F0; border-radius: 8px; padding: 10px;
  }
  .feed-log .entry { padding: 2px 0; border-bottom: 1px solid #f0e8d8; }
  .feed-log .entry:last-child { border-bottom: none; }

  .photo-main img { width: 100%; border-radius: 10px; display: block; background: #f0e8d8; }
  .photo-main .placeholder { height: 200px; display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 14px; background: #FAF6F0; border-radius: 10px; border: 1.5px dashed var(--border); }
  .photo-strip { display: flex; gap: 6px; margin-top: 10px; overflow-x: auto; padding-bottom: 4px; }
  .photo-strip img { width: 72px; height: 54px; object-fit: cover; border-radius: 6px; cursor: pointer; border: 2px solid transparent; opacity: 0.7; transition: opacity 0.15s, border-color 0.15s; flex-shrink: 0; }
  .photo-strip img:hover { opacity: 0.9; }
  .photo-strip img.active { border-color: var(--accent); opacity: 1; }

  .schedule-entry { display: flex; align-items: center; gap: 8px; padding: 6px 0; font-size: 14px; }
  .schedule-entry .time-slot { font-weight: 600; min-width: 72px; }
  .schedule-controls { display: flex; align-items: center; gap: 5px; margin-top: 10px; flex-wrap: wrap; }
  .schedule-controls select, .schedule-controls input { padding: 6px 8px; border: 1px solid var(--border); border-radius: 7px; font-size: 13px; font-family: inherit; background: var(--card); color: var(--text); }
  .schedule-controls input { width: 52px; }

  @media (max-width: 420px) {
    .weights { grid-template-columns: 1fr; }
    .topbar { padding: 10px 14px; }
    .main { padding: 10px; }
  }
</style>
</head>
<body>

<div class="topbar">
  <h1>🐾 宠物喂食</h1>
  <div class="status-row">
    <span><span id="dotMqtt" class="pulse dead"></span><span id="labelMqtt">断开</span></span>
    <span><span id="dotDev" class="pulse dead"></span><span id="labelDev">离线</span></span>
  </div>
</div>

<div class="main">

  <div class="weights">
    <div class="card weight-card">
      <div class="ring"><span class="num" id="valBin">--</span><span class="unit">g</span></div>
      <div class="lbl">粮仓余量</div>
    </div>
    <div class="card weight-card">
      <div class="ring"><span class="num" id="valBowl">--</span><span class="unit">g</span></div>
      <div class="lbl">食盆重量</div>
    </div>
  </div>

  <div class="card">
    <div class="section-label">手动喂食</div>
    <div class="feed-slider">
      <div class="grams-display"><span id="gramNum">50</span><span class="unit">g</span></div>
      <input type="range" id="gramSlider" min="5" max="200" value="50" step="5" oninput="$('gramNum').textContent=this.value">
    </div>
    <button class="btn-primary" onclick="doFeed()">立即喂食</button>
    <div class="feed-log" id="feedLog"></div>
  </div>

  <div class="card">
    <div class="section-label">宠物相册</div>
    <button class="btn-photo" onclick="client.publish(T.photoCmd,JSON.stringify({action:'snap'}))">拍一张照片</button>
    <div style="margin-top:12px">
      <div class="photo-main" id="photoMain"><div class="placeholder">等待照片…</div></div>
      <div class="photo-strip" id="photoStrip"></div>
    </div>
  </div>

  <div class="card">
    <div class="section-label">定时计划</div>
    <div id="schedList" style="min-height:24px;font-size:13px;color:var(--muted)"></div>
    <div class="schedule-controls">
      <select id="schedH"></select><span>:</span><select id="schedM"></select>
      <input type="number" id="schedG" value="30" min="5" max="200" placeholder="g">
      <button class="btn-sm btn-primary" onclick="schedAdd()" style="padding:5px 16px;">+</button>
      <button class="btn-sm" onclick="schedSave()" style="background:var(--border);color:var(--text)">保存</button>
    </div>
  </div>

</div>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<script>
(function(){
const C = {
  broker:'n15ed731.ala.cn-hangzhou.emqxsl.cn', port:8084,
  user:'ESP32', pass:'123qweasd',
  dev:'2EE3A0', cam:'F82C9C'
};
const TOP = {
  weight:   `esp32/${C.dev}/status/weight`,
  feedRes:  `esp32/${C.dev}/status/feed_result`,
  sched:    `esp32/${C.dev}/status/schedule`,
  online:   `esp32/${C.dev}/status/online`,
  photoUrl: `esp32/${C.cam}/status/photo_url`,
  photoList:`esp32/${C.cam}/status/photo_list`,
  feed:     `esp32/${C.dev}/cmd/feed`,
  schedSet: `esp32/${C.dev}/cmd/schedule`,
  photoCmd: `esp32/${C.dev}/cmd/photo`,
  listCmd:  `esp32/${C.cam}/cmd/list_photos`
};
window.T = TOP;
window.client = null;

const $ = id => document.getElementById(id);
const el = {
  mqttDot: $('dotMqtt'), mqttLabel: $('labelMqtt'),
  devDot: $('dotDev'), devLabel: $('labelDev'),
  bin: $('valBin'), bowl: $('valBowl'),
  feedLog: $('feedLog'), gramSlider: $('gramSlider'), gramNum: $('gramNum'),
  photoMain: $('photoMain'), photoStrip: $('photoStrip'),
  schedList: $('schedList'), schedH: $('schedH'), schedM: $('schedM'), schedG: $('schedG')
};

let schedules = [], photos = [], photoIdx = 0;

const conn = window.mqtt.connect(`wss://${C.broker}:${C.port}/mqtt`,{
  username:C.user, password:C.pass,
  clientId:'pfd_' + Math.random().toString(16).slice(2,10), clean:true
});
window.client = conn;

conn.on('connect', ()=>{
  el.mqttDot.className = 'pulse live';
  el.mqttLabel.textContent = '已连接';
  conn.subscribe([TOP.weight,TOP.feedRes,TOP.sched,TOP.online,TOP.photoUrl,TOP.photoList]);
  conn.publish(TOP.listCmd,'{}');
});
conn.on('close', ()=>{
  el.mqttDot.className = 'pulse dead';
  el.mqttLabel.textContent = '断开';
});
conn.on('message', (topic, raw)=>{
  const s = typeof raw === 'string' ? raw : raw.toString();
  const t = String(topic);
  try {
    const d = JSON.parse(s);
    onMsg(t, d);
  } catch(_) {
    if (t === TOP.online) setDev(s === 'online');
  }
});

function setDev(on){
  el.devDot.className = on ? 'pulse live' : 'pulse dead';
  el.devLabel.textContent = on ? '在线' : '离线';
}

function onMsg(t, d){
  if (t === TOP.weight) {
    const b = Number(d.bin), w = Number(d.bowl);
    if (!isNaN(b)) el.bin.textContent = b.toFixed(0);
    if (!isNaN(w)) el.bowl.textContent = w.toFixed(0);
  } else if (t === TOP.feedRes) {
    const now = new Date().toLocaleTimeString();
    el.feedLog.innerHTML += `<div class="entry">${now} · 喂食 ${d.dispensed}g / ${d.target}g ${d.ok?'✓':'✗'}</div>`;
    el.feedLog.scrollTop = el.feedLog.scrollHeight;
    while (el.feedLog.children.length > 30) el.feedLog.removeChild(el.feedLog.firstChild);
  } else if (t === TOP.sched) {
    schedules = (d.times||[]).map(s=>{ const p=s.split(':'); return {h:+p[0],m:+p[1],g:+p[2]}; });
    renderSched();
  } else if (t === TOP.photoUrl) {
    if (d.ok && d.url && !photos.includes(d.url)) {
      photos.unshift(d.url);
      if (photos.length > 20) photos.length = 20;
      renderPhotos();
    }
  } else if (t === TOP.photoList) {
    if (Array.isArray(d)) {
      const seen = new Set(photos);
      d.reverse().forEach(u=>{ if(!seen.has(u)) photos.push(u); });
      if (photos.length) renderPhotos();
    }
  }
}

window.doFeed = function(){
  const g = +el.gramSlider.value;
  conn.publish(TOP.feed, JSON.stringify({grams:g}));
  el.feedLog.innerHTML += `<div class="entry">${new Date().toLocaleTimeString()} · 已发送 ${g}g</div>`;
  el.feedLog.scrollTop = el.feedLog.scrollHeight;
};

function renderPhotos(){
  photoIdx = 0;
  el.photoMain.innerHTML = `<img src="${photos[0]}" alt="照片">`;
  el.photoStrip.innerHTML = photos.slice(0,10).map((u,i)=>
    `<img src="${u}" class="${i===0?'active':''}" onclick="showPhoto(${i})" loading="lazy">`
  ).join('');
}
window.showPhoto = function(i){
  photoIdx = i;
  el.photoMain.innerHTML = `<img src="${photos[i]}" alt="照片">`;
  [...el.photoStrip.children].forEach((x,j)=>x.className=j===i?'active':'');
};

function renderSched(){
  if (!schedules.length) { el.schedList.textContent = '暂无计划'; return; }
  el.schedList.innerHTML = schedules.map((s,i)=>
    `<div class="schedule-entry"><span class="time-slot">${String(s.h).padStart(2,'0')}:${String(s.m).padStart(2,'0')}</span><span>${s.g}g</span><button class="btn-del" onclick="schedDel(${i})">✕</button></div>`
  ).join('');
}
window.schedAdd = function(){
  if (schedules.length>=5){ alert('最多 5 条'); return; }
  schedules.push({h:+el.schedH.value, m:+el.schedM.value, g:+el.schedG.value});
  schedules.sort((a,b)=>a.h*60+a.m - b.h*60-b.m);
  renderSched();
};
window.schedDel = function(i){ schedules.splice(i,1); renderSched(); };
window.schedSave = function(){
  conn.publish(TOP.schedSet, JSON.stringify({times:schedules.map(s=>
    `${String(s.h).padStart(2,'0')}:${String(s.m).padStart(2,'0')}:${s.g}`
  )}));
};

(function(){
  for (let h=0;h<24;h++){ const o=document.createElement('option'); o.value=o.text=String(h).padStart(2,'0'); el.schedH.appendChild(o); }
  for (let m=0;m<60;m+=5){ const o=document.createElement('option'); o.value=o.text=String(m).padStart(2,'0'); el.schedM.appendChild(o); }
})();

})();
</script>
</body>
</html>
